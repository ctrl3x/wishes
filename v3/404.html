<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Желай — 404</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Montserrat:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/404.css">
  <link rel="stylesheet" href="css/nav.css">
</head>
<body class="notfound-page">
  <main class="page">
    <div class="page__canvas" id="canvas">

      <img class="page__logo" src="img/logo.png" alt="Желай" width="100" height="100" decoding="async">

      <img class="notfound__img" src="img/404/big-404.png" alt="404" width="1076" decoding="async">

      <p class="notfound__subtitle">Страница затерялась в азарте</p>

      <a class="notfound__btn" href="index.html">Вернуться на главную</a>

      <div class="notfound__chip notfound__chip--1" role="img" aria-hidden="true"></div>
      <div class="notfound__chip notfound__chip--2" role="img" aria-hidden="true"></div>
      <div class="notfound__chip notfound__chip--3" role="img" aria-hidden="true"></div>
      <div class="notfound__chip notfound__chip--4" role="img" aria-hidden="true"></div>
      <div class="notfound__chip notfound__chip--5" role="img" aria-hidden="true"></div>

      <button class="menu-btn" type="button" aria-label="Открыть меню">
        <img class="menu-btn__icon" src="img/menu-icon.svg" alt="" width="40" height="40" decoding="async">
        <span class="menu-btn__label">МЕНЮ</span>
      </button>

    </div>
  </main>
  <script src="js/script.js"></script>
  <script src="js/404.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
