<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Желай — Книга</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/book.css">
</head>
<body class="book-page">
  <main class="page">
    <div class="page__canvas" id="canvas">

      <img class="page__logo page__logo--book" src="img/logo.png" alt="Желай" width="100" height="100" decoding="async">

      <div class="book-header">
        <h1 class="book-header__title">Книга</h1>
        <div class="book-header__text">
          <p class="book-header__desc">Книга&nbsp;&mdash; это&nbsp;пространство азарта, где&nbsp;можно испытать желание на&nbsp;прочность. Она&nbsp;соблазняет, подсказывает и&nbsp;открывает дверь к&nbsp;тому, чего&nbsp;ты&nbsp;желаешь по‑настоящему.</p>
          <a class="book-header__btn" href="#">Открой желание</a>
        </div>
      </div>

      <div class="book-grid">
        <div class="book-grid__cell"><img class="book-grid__img" src="img/book/Back Page Spread 1.png" alt="Back Page Spread"></div>
        <div class="book-grid__cell"><img class="book-grid__img" src="img/book/1.1 1.png" alt="1.1"></div>
        <div class="book-grid__cell"><img class="book-grid__img" src="img/book/бар 1.png" alt="1.2"></div>
        <div class="book-grid__cell"><img class="book-grid__img" src="img/book/бар 2.png" alt="г_2"></div>
        <div class="book-grid__cell"><img class="book-grid__img" src="img/book/бар 3.png" alt="2.1"></div>
        <div class="book-grid__cell"><img class="book-grid__img" src="img/book/бар 4.png" alt="2.2"></div>

        <div class="book-grid__cell"><img class="book-grid__img" src="img/book/бар 5.png" alt="бар"></div>
        <div class="book-grid__cell"><img class="book-grid__img" src="img/book/бар 6.png" alt="2.5"></div>
        <div class="book-grid__cell"><img class="book-grid__img" src="img/book/бар 7.png" alt="3.0"></div>
        <div class="book-grid__cell"><img class="book-grid__img" src="img/book/бар 8.png" alt="3.1"></div>
        <div class="book-grid__cell"><img class="book-grid__img" src="img/book/бар 9.png" alt="3.3"></div>
        <div class="book-grid__cell"><img class="book-grid__img" src="img/book/3.4.1 1.png" alt="3.4.1"></div>

        <div class="book-grid__cell"><img class="book-grid__img" src="img/book/бар 10.png" alt="3.4.2"></div>
        <div class="book-grid__cell"><img class="book-grid__img" src="img/book/бар 11.png" alt="4"></div>
        <div class="book-grid__cell"><img class="book-grid__img" src="img/book/бар 12.png" alt="4.1"></div>
        <div class="book-grid__cell"><img class="book-grid__img" src="img/book/бар 13.png" alt="4.2"></div>
        <div class="book-grid__cell"><img class="book-grid__img" src="img/book/бар 14.png" alt="4.3"></div>
        <div class="book-grid__cell"><img class="book-grid__img" src="img/book/бар 15.png" alt="4.4"></div>
      </div>

      <div class="book-blur">
        <div class="book-blur__cell"></div>
        <div class="book-blur__cell"></div>
        <div class="book-blur__cell"></div>
        <div class="book-blur__cell"></div>
        <div class="book-blur__cell"></div>
        <div class="book-blur__cell"></div>

        <div class="book-blur__cell"></div>
        <div class="book-blur__cell"></div>

        <div class="book-blur__cell"></div>
        <div class="book-blur__cell"></div>
        <div class="book-blur__cell"></div>
        <div class="book-blur__cell"></div>
        <div class="book-blur__cell"></div>
        <div class="book-blur__cell"></div>
        <div class="book-blur__cell"></div>
        <div class="book-blur__cell"></div>
      </div>

      <div class="book-covers">
        <div class="book-covers__card"></div>
        <div class="book-covers__card"></div>
        <div class="book-covers__card"></div>
        <div class="book-covers__card"></div>
        <div class="book-covers__card"></div>
        <div class="book-covers__card"></div>
        <div class="book-covers__card"></div>

        <div class="book-covers__card"></div>
        <div class="book-covers__card"></div>
      </div>

      <div class="book-zoom-overlay"></div>
      <div class="book-zoom-img"><img src="" alt=""></div>

      <button class="menu-btn menu-btn--book" type="button" aria-label="Открыть меню">
        <span class="menu-btn__icon menu-btn__icon--book"></span>
        <span class="menu-btn__label menu-btn__label--book">о желай</span>
      </button>

    </div>
  </main>
  <script src="js/script.js"></script>
</body>
</html>
