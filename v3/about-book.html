<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Желай — О ЖЕЛАЙ · Книга</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/about-book.css">
  <link rel="stylesheet" href="css/nav.css">
</head>
<body>
  <main class="page">
    <div class="page__canvas" id="canvas">

      <img class="shop-side" src="img/about/book2.png" alt="" decoding="async">
      <img class="shop-bar" src="img/about/book.png" alt="" decoding="async">

      <div class="shop-content">
        <h1 class="shop-content__title">Книга</h1>
        <p class="shop-content__desc">Книга&nbsp;&mdash; это&nbsp;пространство азарта, где&nbsp;можно испытать желание на&nbsp;прочность. Она&nbsp;соблазняет, подсказывает и&nbsp;открывает дверь к&nbsp;тому, чего&nbsp;ты&nbsp;желаешь по‑настоящему.</p>
        <a class="shop-content__btn" href="book.html">подробнее</a>
      </div>

      <img class="page__logo page__logo--shop" src="img/logo.png" alt="Желай" width="100" height="100" decoding="async">

      <button class="menu-btn menu-btn--shop" type="button" aria-label="Открыть меню">
        <img class="menu-btn__icon" src="img/menu-icon-dark.svg" alt="" width="40" height="40" decoding="async">
        <span class="menu-btn__label">МЕНЮ</span>
      </button>

    </div>
  </main>
  <script src="js/script.js"></script>
  <script>
    (function () {
      var prev = 'about-events.html';
      var navigated = false;
      var threshold = 50;
      var accum = 0;

      function go(dir) {
        if (navigated) return;
        navigated = true;
        window.location.href = dir;
      }

      window.addEventListener('wheel', function (event) {
        if (navigated) return;
        accum += event.deltaY;
        if (accum <= -threshold) go(prev);
      }, { passive: true });

      window.addEventListener('keydown', function (event) {
        if (event.key === 'ArrowUp' || event.key === 'PageUp') go(prev);
      });
    })();
  </script>
  <script src="js/nav.js"></script>
</body>
</html>
