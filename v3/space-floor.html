<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Желай — Пространство · 1 этаж</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Montserrat:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/space.css">
  <link rel="stylesheet" href="css/nav.css">
</head>
<body class="page--space-red">
  <main class="page">
    <div class="page__canvas" id="canvas">

      <div class="space-floor">

        <div class="floor-overlay">
          <img class="floor-overlay__img" src="img/space/first-floor.png" alt="" decoding="async">
        </div>

        <div class="floor-info">

          <button class="floor-info__btn" type="button">
            <span class="floor-info__btn-dot"></span>
            <span class="floor-info__btn-text">1 этаж — вступление</span>
          </button>

          <div class="floor-info__text">
            <p class="floor-info__desc">Первый этаж&nbsp;&mdash; создаёт ощущение, что&nbsp;вы&nbsp;пришли не&nbsp;в&nbsp;казино, а&nbsp;в&nbsp;пространство вкуса. Белый цвет здесь&nbsp;&mdash; про&nbsp;чистоту решения: будто&nbsp;вы&nbsp;ещё&nbsp;можете выйти и&nbsp;ничего не&nbsp;потерять.</p>
            <p class="floor-info__func">Функция уровня&nbsp;&mdash; успокоить, очаровать и&nbsp;незаметно подготовить к&nbsp;переходу в&nbsp;игру.</p>
          </div>

          <img class="floor-diagram" src="img/space/navigation.png" alt="" decoding="async">

        </div>

        <img class="page__logo page__logo--space" src="img/logo.png" alt="Желай" width="100" height="100" decoding="async">

        <button class="menu-btn menu-btn--space" type="button" aria-label="Открыть меню">
          <img class="menu-btn__icon" src="img/menu-icon.svg" alt="" width="40" height="40" decoding="async">
          <span class="menu-btn__label">МЕНЮ</span>
        </button>

      </div>

    </div>
  </main>
  <script src="js/script.js"></script>
  <script>
    (function () {
      var prev = 'space-about-building.html';
      var next = 'space-bar.html';
      var navigated = false;
      var threshold = 50;
      var accum = 0;

      function go(dir) {
        if (navigated) return;
        navigated = true;
        window.location.href = dir;
      }

      window.addEventListener('wheel', function (event) {
        if (navigated) return;
        accum += event.deltaY;
        if (accum >= threshold) go(next);
        else if (accum <= -threshold) go(prev);
      }, { passive: true });

      window.addEventListener('keydown', function (event) {
        if (event.key === 'ArrowDown' || event.key === 'PageDown') go(next);
        if (event.key === 'ArrowUp' || event.key === 'PageUp') go(prev);
      });
    })();
  </script>
  <script src="js/nav.js"></script>
</body>
</html>
