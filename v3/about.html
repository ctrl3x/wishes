<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Желай — о желай</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/about.css">
</head>
<body>
  <main class="page">
    <div class="page__canvas" id="canvas">
      <img class="page__bg" src="img/about/background-space.png" alt="" width="1920" height="1080" decoding="async">

      <img class="page__logo page__logo--about" src="img/logo.png" alt="Желай" width="100" height="100" decoding="async">

      <button class="play-btn" type="button" aria-label="Воспроизвести">
        <img src="img/play.svg" alt="" width="100" height="100" decoding="async">
      </button>

      <div class="menu-drawer">
        <div class="menu-panel">
          <div class="menu-panel__brand">
            <img class="menu-panel__brand-logo" src="img/logo.png" alt="" width="140" height="140" decoding="async">
            <p class="menu-panel__brand-title">Казино желаний</p>
          </div>

          <div class="menu-panel__intro">
            <p class="menu-panel__desc">«ЖЕЛАЙ» — это&nbsp;салон искушений, где&nbsp;люди ставят на&nbsp;исполнение своих желаний не&nbsp;деньги, а&nbsp;время жизни, память и&nbsp;свободу.</p>
            <div class="menu-panel__ctas">
              <a class="menu-panel__cta" href="#">
                <span>сделай ставку</span>
                <img src="img/arrow.svg" alt="" width="30" height="30" decoding="async">
              </a>
              <a class="menu-panel__cta" href="#">
                <span>испытай азарт</span>
                <img src="img/arrow.svg" alt="" width="30" height="30" decoding="async">
              </a>
            </div>
          </div>

          <nav class="menu-panel__tabs" aria-label="Разделы">
            <a class="menu-tab menu-tab--active" href="about.html">о желай</a>
            <a class="menu-tab menu-tab--filled" href="about.html">пространство</a>
            <a class="menu-tab" href="#">Магазин</a>
            <a class="menu-tab" href="#">События</a>
            <a class="menu-tab" href="#">книга</a>
          </nav>

          <div class="menu-panel__social">
            <a class="menu-panel__social-link" href="#" aria-label="Behance">
              <img src="img/social-1.svg" alt="" width="40" height="40" decoding="async">
            </a>
            <a class="menu-panel__social-link" href="#" aria-label="VK">
              <img src="img/social-2.svg" alt="" width="40" height="40" decoding="async">
            </a>
            <a class="menu-panel__social-link" href="#" aria-label="Telegram">
              <img src="img/social-3.svg" alt="" width="40" height="40" decoding="async">
            </a>
          </div>

          <div class="menu-panel__subscribe">
            <p class="menu-panel__subscribe-title">Будь ближе к ЖЕЛАЙ</p>
            <form class="menu-panel__email-form" action="#" method="post">
              <label class="menu-panel__email-field">
                <span class="visually-hidden">Email</span>
                <input type="email" name="email" placeholder="Email" autocomplete="email">
              </label>
              <button class="menu-panel__email-submit" type="submit" aria-label="Подписаться">
                <img src="img/arrow-email.svg" alt="" width="35" height="35" decoding="async">
              </button>
            </form>
          </div>
        </div>

        <a class="menu-drawer__close" href="index.html" aria-label="Закрыть меню">
          <img src="img/close.svg" alt="" width="14" height="14" decoding="async">
        </a>
      </div>
    </div>
  </main>
  <script src="js/script.js"></script>
  <script src="js/about-scroll.js"></script>
</body>
</html>
