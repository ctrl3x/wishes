<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Желай — Пространство</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Montserrat:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/space.css">
</head>
<body class="page--space-white">
  <main class="page">
    <div class="page__canvas page__canvas--light" id="canvas">

      <img class="space-building" src="img/space/building.png" alt="" decoding="async">

      <div class="space-text">
        <h1 class="space-text__title">пространство</h1>
        <p class="space-text__desc">&laquo;ЖЕЛАЙ&raquo; построено по&nbsp;принципу колеса баланса: круг задаёт замкнутую систему, а&nbsp;оси&nbsp;делят пространство на&nbsp;сектора, повторяя деление колеса. Благодаря этому движение внутри становится не&nbsp;&laquo;прогулкой&raquo;, а&nbsp;прохождением последовательных стадий.</p>
      </div>

      <img class="page__logo page__logo--space" src="img/logo.png" alt="Желай" width="100" height="100" decoding="async">

      <button class="menu-btn menu-btn--space" type="button" aria-label="Открыть меню">
        <img class="menu-btn__icon" src="img/menu-icon.svg" alt="" width="40" height="40" decoding="async">
        <span class="menu-btn__label">МЕНЮ</span>
      </button>

    </div>
  </main>
  <script src="js/script.js"></script>
  <script>
    (function () {
      var prev = 'space.html';
      var next = 'space-floor.html';
      var navigated = false;
      var threshold = 50;
      var accum = 0;

      function go(dir) {
        if (navigated) return;
        navigated = true;
        window.location.href = dir;
      }

      window.addEventListener('wheel', function (event) {
        if (navigated) return;
        accum += event.deltaY;
        if (accum >= threshold) go(next);
        else if (accum <= -threshold) go(prev);
      }, { passive: true });

      window.addEventListener('keydown', function (event) {
        if (event.key === 'ArrowDown' || event.key === 'PageDown') go(next);
        if (event.key === 'ArrowUp' || event.key === 'PageUp') go(prev);
      });
    })();
  </script>
</body>
</html>
