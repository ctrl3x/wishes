<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishes v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Frame 646 -->
  <section class="frame main">
    <!-- Ж -->
    <div class="wish-title-block"></div>
    <!-- ЖЕЛАЙ -->
    <span class="wish-title">ЖЕЛАЙ</span>
    <!-- snake -->
    <div class="main__snake"></div>
    <!-- bet × 5 -->
    <div class="main__bet main__bet--1"></div>
    <div class="main__bet main__bet--2"></div>
    <div class="main__bet main__bet--3"></div>
    <div class="main__bet main__bet--4"></div>
    <div class="main__bet main__bet--5"></div>
  </section>

  <!-- the running line -->
  <section class="running-line running-line--bordered"></section>

  <!-- Frame 630 -->
  <section class="frame 2"></section>

  <!-- the running line -->
  <section class="running-line running-line--white"></section>

  <!-- Frame 647 -->
  <section class="frame 3"></section>

  <!-- Frame 644 -->
  <section class="frame 4"></section>

  <!-- Frame 648 -->
  <section class="frame 5">
    <!-- пики (♠), черви (♥), бубны (♦) и трефы (♣) -->
    <div class="suits-block">♠ ♥ ♦ ♣</div>
    <!-- footer -->
    <footer class="footer-block"></footer>
  </section>

  <script src="js/script.js"></script>
</body>
</html>
